<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: "Manrope", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.2), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(156, 197, 255, 0.18), transparent 18%),
    linear-gradient(180deg, #f8fbff, #eef4ff 44%, #f4f8ff);
  color: #1a2c42;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(90,119,163,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,119,163,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.navbar {
  position: fixed;
  top: 16px;
  left: 16px;
  right: 16px;
  z-index: 20;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid rgba(86,118,170,0.14);
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
  backdrop-filter: blur(16px);
}
.navbar .brand strong {
  display: block;
  font-family: "Syne", sans-serif;
  font-size: 1.1rem;
}
.navbar .brand span {
  color: #697f98;
  font-size: 0.9rem;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.nav-links a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(86,118,170,0.14);
  background: rgba(255, 255, 255, 0.8);
  color: #1a2c42;
  text-decoration: none;
  font-weight: 800;
}
.wrapper {
  width: min(980px, calc(100vw - 32px));
}
.ticket {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  border: 1px solid rgba(154, 210, 255, 0.12);
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
.left,
.right {
  padding: 28px;
}
.left {
  background: linear-gradient(180deg, #f9fbff, #edf3ff);
  color: #151922;
}
.right {
  background: linear-gradient(180deg, #ffffff, #eef4ff 56%, #e6efff);
  color: #1a2c42;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.pill {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(30,167,253,0.1);
  color: #1ea7fd;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.left h1 {
  margin: 16px 0 10px;
  font-family: "Syne", sans-serif;
  font-size: clamp(2rem, 5vw, 3.4rem);
  line-height: 0.98;
}
.left p {
  color: #5d6d88;
  line-height: 1.75;
}
.meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 18px;
}
.meta-box {
  background: rgba(16, 44, 92, 0.06);
  border-radius: 18px;
  padding: 14px;
}
.meta-box strong {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  color: #5d6d88;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.right p {
  color: #697f98;
  line-height: 1.75;
}
.actions {
  margin-top: 18px;
  text-align: center;
}
.actions a,
.actions button {
  display: inline-block;
  margin: 8px 8px 0 0;
  padding: 12px 16px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #1ea7fd, #8fd1ff);
  color: #ffffff;
  text-decoration: none;
  cursor: pointer;
  font-weight: 800;
}
@media (max-width: 820px) {
  .ticket { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  body {
    padding: 76px 12px 18px;
    display: block;
  }
  .home-link {
    top: 12px;
    left: 12px;
    padding: 10px 14px;
    font-size: 0.9rem;
  }
  .wrapper {
    width: 100%;
  }
  .ticket {
    border-radius: 20px;
  }
  .left,
  .right {
    padding: 18px 16px;
  }
  .left h1 {
    font-size: 1.9rem;
  }
  .left p,
  .right p {
    font-size: 0.92rem;
  }
  .meta {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .actions {
    display: grid;
  }
  .actions a,
  .actions button {
    width: 100%;
    margin: 0;
    text-align: center;
  }
}
</style>
<style>
.home-link {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(86,118,170,0.14);
  background: rgba(255,255,255,0.94);
  color: #1a2c42;
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
</style>
</head>
<body>
<header class="navbar">
  <div class="brand">
    <strong>TrendCart</strong>
    <span>Movie ticket view</span>
  </div>
  <nav class="nav-links" aria-label="Primary">
    <a href="index.html">Home</a>
    <a href="Product.html">Products</a>
    <a href="Food.html">Foods</a>
    <a href="Movies.html">Movies</a>
    <a href="Login.html">Login</a>
  </nav>
</header>
<div class="wrapper">
  <div class="ticket" id="ticket">Loading ticket...</div>
  <div class="actions">
    <a href="Movies.html">Book Another</a>
    <button id="printBtn" type="button">Print Ticket</button>
  </div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadTicket() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const box = document.getElementById("ticket");

  if (!id) {
    box.textContent = "Ticket id is missing.";
    return;
  }

  try {
    const ticket = await TrendCartAPI.getMovieTicket(id);
    box.innerHTML = `
      <div class="left">
        <span class="pill">TrendCart Cinema Pass</span>
        <h1>${ticket.movie}</h1>
        <p>Your booking is confirmed and saved in the database for your account.</p>
        <div class="meta">
          <div class="meta-box"><strong>Ticket ID</strong>#${ticket.id}</div>
          <div class="meta-box"><strong>Theatre</strong>${ticket.theatre}</div>
          <div class="meta-box"><strong>Show Time</strong>${ticket.time}</div>
          <div class="meta-box"><strong>Seats</strong>${ticket.seats.join(", ")}</div>
          <div class="meta-box"><strong>Snacks</strong>${ticket.snacks.length ? ticket.snacks.join(", ") : "None"}</div>
          <div class="meta-box"><strong>Paid</strong>${TrendCartAPI.formatCurrency(ticket.price)}</div>
        </div>
      </div>
      <div class="right">
        <h2>Booking details</h2>
        <p>This page keeps your movie summary, seats, snacks, and Razorpay reference in one printable ticket view.</p>
        <p><strong>Booked At:</strong> ${ticket.date}</p>
        <p><strong>Razorpay Ref:</strong> ${ticket.paymentReference || "Not available"}</p>
        <p><strong>Status:</strong> ${ticket.bookingStatus || "Confirmed"}</p>
      </div>
    `;
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    box.textContent = error.message;
  }
}

document.getElementById("printBtn").addEventListener("click", () => {
  window.print();
});

loadTicket();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0b1221;
  color: #ecf3ff;
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 32px 20px 50px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.topbar a {
  text-decoration: none;
  background: #1758d7;
  color: white;
  padding: 12px 16px;
  border-radius: 999px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat,
.panel {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  padding: 20px;
}

.panels {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.row {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.row:last-child {
  border-bottom: none;
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Admin Dashboard</h1>
      <p>Platform overview for users, orders, revenue, and ticket bookings</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <a href="Profile.html">Profile</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="panels">
    <section class="panel">
      <h2>Recent Users</h2>
      <div id="recentUsers"></div>
    </section>
    <section class="panel">
      <h2>Recent Orders</h2>
      <div id="recentOrders"></div>
    </section>
    <section class="panel">
      <h2>Recent Tickets</h2>
      <div id="recentTickets"></div>
    </section>
  </div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadAdmin() {
  try {
    const data = await TrendCartAPI.getAdminOverview();
    const stats = data.stats;
    document.getElementById("stats").innerHTML = `
      <div class="stat"><h3>${stats.users}</h3><p>Users</p></div>
      <div class="stat"><h3>${stats.products}</h3><p>Products</p></div>
      <div class="stat"><h3>${stats.foodItems}</h3><p>Food Items</p></div>
      <div class="stat"><h3>${stats.orders}</h3><p>Orders</p></div>
      <div class="stat"><h3>${stats.tickets}</h3><p>Movie Tickets</p></div>
      <div class="stat"><h3>${TrendCartAPI.formatCurrency(stats.revenue)}</h3><p>Total Revenue</p></div>
    `;

    document.getElementById("recentUsers").innerHTML = data.recentUsers.map((user) => `
      <div class="row">
        <strong>${user.name}</strong><br>
        <span>${user.email} • ${user.role}</span>
      </div>
    `).join("");

    document.getElementById("recentOrders").innerHTML = data.recentOrders.map((order) => `
      <div class="row">
        <strong>Order #${order.id}</strong><br>
        <span>${order.order_type} • ${TrendCartAPI.formatCurrency(order.total_amount)} • ${order.payment_status}</span><br>
        <span>UPI Ref: ${order.payment_reference || "Not entered"}</span>
      </div>
    `).join("");

    document.getElementById("recentTickets").innerHTML = data.recentTickets.map((ticket) => `
      <div class="row">
        <strong>${ticket.movie_name}</strong><br>
        <span>${ticket.theatre} • ${TrendCartAPI.formatCurrency(ticket.total_price)}</span><br>
        <span>UPI Ref: ${ticket.payment_reference || "Not entered"}</span>
      </div>
    `).join("");
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    document.getElementById("stats").innerHTML = `<div class="stat">${error.message}</div>`;
  }
}

loadAdmin();
</script>
</body>
</html>

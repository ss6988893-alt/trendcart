<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Scan</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #061428, #153d7e 60%, #1d9bf0);
  color: white;
}

.card {
  width: min(560px, calc(100vw - 32px));
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 28px;
  padding: 28px;
  backdrop-filter: blur(16px);
  box-shadow: 0 24px 56px rgba(0, 0, 0, 0.24);
}

.badge {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(22, 255, 149, 0.18);
  color: #d8fff0;
  font-size: 13px;
  font-weight: 700;
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.row:last-child {
  border-bottom: none;
}

.value {
  text-align: right;
  font-weight: 700;
}

a {
  display: inline-block;
  margin-top: 18px;
  padding: 12px 16px;
  border-radius: 999px;
  background: white;
  color: #102c5c;
  text-decoration: none;
  font-weight: 700;
}
</style>
</head>
<body>

<div class="card" id="card">Loading ticket verification...</div>

<script>
async function loadPublicTicket() {
  const id = new URLSearchParams(window.location.search).get("id");
  const box = document.getElementById("card");

  if (!id) {
    box.textContent = "Ticket id is missing.";
    return;
  }

  try {
    const response = await fetch(`/api/public/movie-tickets/${id}`);
    const ticket = await response.json();

    if (!response.ok) {
      throw new Error(ticket.message || "Unable to load ticket.");
    }

    box.innerHTML = `
      <span class="badge">Entry Verified</span>
      <h1>${ticket.movie}</h1>
      <p>This ticket was loaded from the backend after QR scan.</p>
      <div class="row"><span>Ticket ID</span><span class="value">#${ticket.id}</span></div>
      <div class="row"><span>Movie</span><span class="value">${ticket.movie}</span></div>
      <div class="row"><span>Theatre</span><span class="value">${ticket.theatre}</span></div>
      <div class="row"><span>Timing</span><span class="value">${ticket.time}</span></div>
      <div class="row"><span>Seats</span><span class="value">${ticket.seats.join(", ")}</span></div>
      <div class="row"><span>Payment</span><span class="value">${ticket.paymentStatus}</span></div>
      <div class="row"><span>Booking</span><span class="value">${ticket.bookingStatus}</span></div>
      <div class="row"><span>UPI Ref</span><span class="value">${ticket.paymentReference || "Not entered"}</span></div>
      <div class="row"><span>Booked At</span><span class="value">${ticket.date}</span></div>
      <a href="Movies.html">Back to Movies</a>
    `;
  } catch (error) {
    box.textContent = error.message;
  }
}

loadPublicTicket();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --line: rgba(154, 210, 255, 0.12);
  --text: #eef5ff;
  --muted: #95a8c7;
  --accent: #89f8d6;
  --accent-2: #6db8ff;
  --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.16), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(137, 248, 214, 0.12), transparent 18%),
    linear-gradient(180deg, #040814, #081020 44%, #050816);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.page {
  position: relative;
  max-width: 1140px;
  margin: 0 auto;
  padding: 24px 20px 42px;
}
.topbar,
.hero,
.stat {
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(6, 12, 26, 0.74);
  backdrop-filter: blur(16px);
}
.topbar a,
.topbar button,
.quick a {
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 800;
}
.hero {
  border-radius: 28px;
  padding: 24px;
  background: linear-gradient(135deg, rgba(10, 18, 38, 0.92), rgba(8, 16, 34, 0.76));
}
.hero h2 {
  margin: 0 0 10px;
  font-family: "Syne", sans-serif;
  font-size: 2.2rem;
}
.hero p {
  margin: 0;
  color: var(--muted);
  line-height: 1.75;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}
.stats {
  margin-top: 20px;
}
.stat {
  border-radius: 22px;
  padding: 22px;
  background: rgba(10, 18, 36, 0.84);
}
.stat h3 {
  margin: 0 0 8px;
  font-family: "Syne", sans-serif;
  font-size: 2rem;
}
.stat p {
  margin: 0;
  color: var(--muted);
}
.quick {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Profile</h1>
      <p>Account details and activity summary</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <section class="hero" id="profileCard">Loading profile...</section>

  <section class="stats">
    <div class="grid" id="statsGrid"></div>
  </section>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadProfile() {
  try {
    const data = await TrendCartAPI.getProfileSummary();
    const user = data.user;
    const adminLink = user.role === "admin" ? `<a href="Admin.html">Admin Dashboard</a>` : "";
    document.getElementById("profileCard").innerHTML = `
      <h2>${user.name}</h2>
      <p><strong>Email:</strong> ${user.email}</p>
      <p><strong>Role:</strong> ${user.role}</p>
      <div class="quick">
        <a href="Orderhistory.html">Order History</a>
        <a href="Tickethistory.html">Ticket History</a>
        ${adminLink}
      </div>
    `;

    const stats = data.stats;
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat"><h3>${stats.cartItems}</h3><p>Items in Cart</p></div>
      <div class="stat"><h3>${stats.productOrders}</h3><p>Product Orders</p></div>
      <div class="stat"><h3>${stats.foodOrders}</h3><p>Food Orders</p></div>
      <div class="stat"><h3>${stats.movieTickets}</h3><p>Movie Tickets</p></div>
    `;
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    document.getElementById("profileCard").textContent = error.message;
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await TrendCartAPI.logout();
  window.location.href = "Login.html";
});

loadProfile();
</script>
</body>
</html>

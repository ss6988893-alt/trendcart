<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #edf4ff, #f7f9fc);
  color: #13233e;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px 50px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.topbar a,
.topbar button,
.quick a {
  text-decoration: none;
  border: none;
  background: #1758d7;
  color: white;
  padding: 12px 16px;
  border-radius: 999px;
  cursor: pointer;
}

.hero,
.panel,
.stat {
  background: white;
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 16px 34px rgba(12, 31, 64, 0.08);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}

.stats {
  margin-top: 20px;
}

.quick {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Profile</h1>
      <p>Account details and activity summary</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <section class="hero" id="profileCard">Loading profile...</section>

  <section class="stats">
    <div class="grid" id="statsGrid"></div>
  </section>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadProfile() {
  try {
    const data = await TrendCartAPI.getProfileSummary();
    const user = data.user;
    const adminLink = user.role === "admin" ? `<a href="Admin.html">Admin Dashboard</a>` : "";
    document.getElementById("profileCard").innerHTML = `
      <h2>${user.name}</h2>
      <p><strong>Email:</strong> ${user.email}</p>
      <p><strong>Role:</strong> ${user.role}</p>
      <div class="quick">
        <a href="Orderhistory.html">Order History</a>
        <a href="Tickethistory.html">Ticket History</a>
        ${adminLink}
      </div>
    `;

    const stats = data.stats;
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat"><h3>${stats.cartItems}</h3><p>Items in Cart</p></div>
      <div class="stat"><h3>${stats.productOrders}</h3><p>Product Orders</p></div>
      <div class="stat"><h3>${stats.foodOrders}</h3><p>Food Orders</p></div>
      <div class="stat"><h3>${stats.movieTickets}</h3><p>Movie Tickets</p></div>
    `;
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    document.getElementById("profileCard").textContent = error.message;
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await TrendCartAPI.logout();
  window.location.href = "Login.html";
});

loadProfile();
</script>
</body>
</html>

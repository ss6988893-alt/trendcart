<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --line: rgba(86, 118, 170, 0.14);
  --text: #1a2c42;
  --muted: #697f98;
  --accent: #1ea7fd;
  --accent-2: #6d78ff;
  --shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.2), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(156, 197, 255, 0.18), transparent 18%),
    linear-gradient(180deg, #f8fbff, #eef4ff 44%, #f4f8ff);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(90,119,163,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,119,163,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.page {
  position: relative;
  max-width: 1140px;
  margin: 0 auto;
  padding: 24px 20px 42px;
}
.topbar,
.hero,
.stat {
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(16px);
}
.topbar a,
.topbar button,
.quick a {
  text-decoration: none;
  border: 1px solid rgba(86,118,170,0.14);
  background: #f7faff;
  color: var(--text);
  padding: 12px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 800;
}
.hero {
  border-radius: 28px;
  padding: 24px;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(242, 246, 255, 0.96));
}
.hero h2 {
  margin: 0 0 10px;
  font-family: "Syne", sans-serif;
  font-size: 2.2rem;
}
.hero p {
  margin: 0;
  color: var(--muted);
  line-height: 1.75;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
}
.stats {
  margin-top: 20px;
}
.stat {
  border-radius: 22px;
  padding: 22px;
  background: rgba(255, 255, 255, 0.92);
}
.stat h3 {
  margin: 0 0 8px;
  font-family: "Syne", sans-serif;
  font-size: 2rem;
}
.stat p {
  margin: 0;
  color: var(--muted);
}
.quick {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}
</style>
<style>
.home-link {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(86,118,170,0.14);
  background: rgba(255,255,255,0.94);
  color: #1a2c42;
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
</style>
</head>
<body>
<a class="home-link" href="index.html">Home</a>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Profile</h1>
      <p>Account details and activity summary</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <section class="hero" id="profileCard">Loading profile...</section>

  <section class="stats">
    <div class="grid" id="statsGrid"></div>
  </section>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadProfile() {
  try {
    const data = await TrendCartAPI.getProfileSummary();
    const user = data.user;
    const adminLink = user.role === "admin" ? `<a href="Admin.html">Admin Dashboard</a>` : "";
    document.getElementById("profileCard").innerHTML = `
      <h2>${user.name}</h2>
      <p><strong>Mobile:</strong> ${user.mobile || "Not available"}</p>
      <p><strong>Account ID:</strong> ${user.email}</p>
      <p><strong>Role:</strong> ${user.role}</p>
      <div class="quick">
        <a href="Orderhistory.html">Order History</a>
        <a href="Movies.html">Movie Booking</a>
        ${adminLink}
      </div>
    `;

    const stats = data.stats;
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat"><h3>${stats.cartItems}</h3><p>Items in Cart</p></div>
      <div class="stat"><h3>${stats.productOrders}</h3><p>Product Orders</p></div>
      <div class="stat"><h3>${stats.foodOrders}</h3><p>Food Orders</p></div>
      <div class="stat"><h3>${stats.movieTickets}</h3><p>Movie Tickets</p></div>
    `;
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    document.getElementById("profileCard").textContent = error.message;
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await TrendCartAPI.logout();
  window.location.href = "Login.html";
});

loadProfile();
</script>
</body>
</html>

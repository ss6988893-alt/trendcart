<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --line: rgba(86, 118, 170, 0.14);
  --text: #1a2c42;
  --muted: #697f98;
  --accent: #1ea7fd;
  --shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.2), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(156, 197, 255, 0.18), transparent 18%),
    linear-gradient(180deg, #f8fbff, #eef4ff 44%, #f4f8ff);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(90,119,163,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,119,163,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.box {
  width: min(760px, calc(100vw - 32px));
  border: 1px solid var(--line);
  border-radius: 30px;
  padding: 32px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
}
.eyebrow {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(30,167,253,0.1);
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
h1 {
  margin: 16px 0 10px;
  font-family: "Syne", sans-serif;
  font-size: clamp(2rem, 5vw, 3.4rem);
  line-height: 0.98;
}
p {
  margin: 0;
  color: var(--muted);
  line-height: 1.75;
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}
a {
  display: inline-block;
  padding: 12px 16px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 800;
}
.primary {
  background: linear-gradient(135deg, var(--accent), #8fd1ff);
  color: #ffffff;
}
.secondary {
  background: #f7faff;
  color: var(--text);
  border: 1px solid rgba(86,118,170,0.14);
}
#details {
  margin-top: 20px;
  text-align: left;
  background: #f7faff;
  border: 1px solid rgba(86,118,170,0.1);
  border-radius: 18px;
  padding: 18px;
  color: var(--muted);
}
#details strong {
  color: var(--text);
}
</style>
<style>
.home-link {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(86,118,170,0.14);
  background: rgba(255,255,255,0.94);
  color: #1a2c42;
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
</style>
</head>
<body>
<a class="home-link" href="index.html">Home</a>
<div class="box">
  <span class="eyebrow">Payment Complete</span>
  <h1>Order successful.</h1>
  <p>Your payment is complete and the order has been saved in the backend and MySQL database.</p>
  <div id="details">Loading order details...</div>
  <div class="actions">
    <a class="primary" href="index.html">Go Home</a>
    <a class="secondary" href="Orderhistory.html">Open Order History</a>
  </div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadDetails() {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("id");
  const type = params.get("type") || "product";
  const details = document.getElementById("details");

  if (!orderId) {
    details.textContent = "Order created successfully.";
    return;
  }

  try {
    const order = await TrendCartAPI.getOrder(orderId);
    const itemsHtml = order.items.map((item) => `
      <li>${item.item_name} - ${item.quantity} x ${TrendCartAPI.formatCurrency(item.unit_price)}</li>
    `).join("");

    details.innerHTML = `
      <p><strong>Order ID:</strong> #${order.id}</p>
      <p><strong>Type:</strong> ${type}</p>
      <p><strong>Order Status:</strong> ${order.order_status || "Placed"}</p>
      <p><strong>Status:</strong> ${order.payment_status}</p>
      <p><strong>Payment Method:</strong> ${order.payment_method}</p>
      <p><strong>Razorpay Ref:</strong> ${order.payment_reference || "Not available"}</p>
      <p><strong>Total:</strong> ${TrendCartAPI.formatCurrency(order.total_amount)}</p>
      <p><strong>Items:</strong></p>
      <ul>${itemsHtml}</ul>
    `;
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    details.textContent = error.message;
  }
}

loadDetails();
</script>
</body>
</html>

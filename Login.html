<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendCart Login</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1a4fb8, #fe7a36);
  display: grid;
  place-items: center;
}

.card {
  width: min(420px, calc(100vw - 32px));
  padding: 32px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  color: white;
}

h1 {
  margin: 0 0 8px;
  font-size: 32px;
}

p {
  margin: 0 0 18px;
  color: #f5f5f5;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  border-radius: 12px;
  box-sizing: border-box;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 999px;
  background: #101820;
  color: white;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
}

button.secondary {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.5);
}

.hint {
  margin-top: 16px;
  font-size: 13px;
  color: #fce7d8;
}

#message {
  min-height: 20px;
  margin-top: 12px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="card">
  <h1>TrendCart</h1>
  <p>Login or create a new account for the full MySQL version of your project.</p>

  <input type="text" id="name" placeholder="Name for signup only">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <button id="registerBtn" class="secondary">Create Account</button>

  <div id="message"></div>
  <div class="hint">Demo account: <strong>demo@trendcart.com</strong> / <strong>123456</strong></div>
</div>

<script src="Assests/api.js"></script>
<script>
const messageBox = document.getElementById("message");

function setMessage(text, isError = false) {
  messageBox.textContent = text;
  messageBox.style.color = isError ? "#ffd6d6" : "#d8ffe0";
}

async function redirectIfLoggedIn() {
  const { user } = await TrendCartAPI.getCurrentUser();
  if (user) {
    window.location.href = "index.html";
  }
}

async function handleLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    setMessage("Please enter email and password.", true);
    return;
  }

  try {
    await TrendCartAPI.login({ email, password });
    setMessage("Login successful. Redirecting...");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 800);
  } catch (error) {
    setMessage(error.message, true);
  }
}

async function handleRegister() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    setMessage("Please enter name, email, and password.", true);
    return;
  }

  try {
    await TrendCartAPI.register({ name, email, password });
    setMessage("Account created. Redirecting...");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 800);
  } catch (error) {
    setMessage(error.message, true);
  }
}

document.getElementById("loginBtn").addEventListener("click", handleLogin);
document.getElementById("registerBtn").addEventListener("click", handleRegister);

redirectIfLoggedIn().catch(() => {});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #b22222, #6b1010);
}

.box {
  background: white;
  border-radius: 22px;
  padding: 32px;
  width: min(420px, calc(100vw - 32px));
  text-align: center;
}

a {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 999px;
  background: #1758d7;
  color: white;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="box">
  <h1>Payment Failed</h1>
  <p id="message">Please try again.</p>
  <a href="Payment.html">Try Again</a>
  <a href="index.html">Go Home</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const message = params.get("message");
if (message) {
  document.getElementById("message").textContent = message;
}
</script>
</body>
</html>

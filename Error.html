<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #b22222, #6b1010);
}

.box {
  background: white;
  border-radius: 22px;
  padding: 32px;
  width: min(420px, calc(100vw - 32px));
  text-align: center;
}

a {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 999px;
  background: #1758d7;
  color: white;
  text-decoration: none;
}
</style>
<style>
.home-link {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.94);
  color: #6b1010;
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
}
@media (max-width: 480px) {
  body {
    padding: 76px 12px 18px;
    display: block;
  }
  .home-link {
    top: 12px;
    left: 12px;
    padding: 10px 14px;
    font-size: 0.9rem;
  }
  .box {
    width: 100%;
    padding: 22px 16px;
    border-radius: 18px;
  }
  a {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>
<body>
<a class="home-link" href="index.html">Home</a>
<div class="box">
  <h1>Payment Failed</h1>
  <p id="message">Please try again.</p>
  <a href="Payment.html">Try Again</a>
  <a href="index.html">Go Home</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const message = params.get("message");
if (message) {
  document.getElementById("message").textContent = message;
}
</script>
</body>
</html>

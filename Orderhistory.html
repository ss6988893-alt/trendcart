<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --line: rgba(86, 118, 170, 0.14);
  --text: #1a2c42;
  --muted: #697f98;
  --accent: #1ea7fd;
  --shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.2), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(156, 197, 255, 0.18), transparent 18%),
    linear-gradient(180deg, #f8fbff, #eef4ff 44%, #f4f8ff);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(90,119,163,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,119,163,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.page {
  position: relative;
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px 16px 42px;
}
.topbar,
.card {
  border: 1px solid var(--line);
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(16px);
}
.topbar a {
  text-decoration: none;
  background: #f7faff;
  border: 1px solid rgba(86,118,170,0.14);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 999px;
  font-weight: 800;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 18px;
}
.card {
  border-radius: 24px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.92);
}
.card h3 {
  margin-top: 0;
  font-family: "Syne", sans-serif;
}
ul {
  padding-left: 18px;
  color: var(--muted);
}
.meta {
  color: var(--muted);
  font-size: 14px;
}
.card p {
  color: var(--muted);
}
.card strong {
  color: var(--text);
}
</style>
<style>
.home-link {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(86,118,170,0.14);
  background: rgba(255,255,255,0.94);
  color: #1a2c42;
  text-decoration: none;
  font-weight: 800;
  box-shadow: 0 18px 44px rgba(45, 79, 128, 0.14);
}
@media (max-width: 480px) {
  .page {
    padding: 84px 12px 24px;
  }
  .home-link {
    top: 12px;
    left: 12px;
    padding: 10px 14px;
    font-size: 0.9rem;
  }
  .topbar,
  .card {
    padding: 16px;
    border-radius: 20px;
  }
  .topbar > div:last-child {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .topbar a {
    width: 100%;
    text-align: center;
    padding: 11px 12px;
  }
  .grid {
    grid-template-columns: 1fr;
    gap: 14px;
  }
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Order History</h1>
      <p>Products and food orders saved from checkout</p>
    </div>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="Product.html">Products</a>
      <a href="Food.html">Foods</a>
      <a href="Movies.html">Movies</a>
      <a href="Login.html">Login</a>
    </nav>
  </div>
  <div class="grid" id="orders"></div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadOrders() {
  const box = document.getElementById("orders");
  try {
    const orders = await TrendCartAPI.getOrderHistory();
    if (!orders.length) {
      box.innerHTML = `<div class="card">No orders found yet.</div>`;
      return;
    }

    box.innerHTML = orders.map((order) => `
      <div class="card">
        <h3>Order #${order.id}</h3>
        <p class="meta">${order.orderType.toUpperCase()} - ${order.orderStatus || "Placed"}</p>
        <p><strong>Total:</strong> ${TrendCartAPI.formatCurrency(order.totalAmount)}</p>
        <p><strong>Payment:</strong> ${order.paymentMethod}</p>
        <p><strong>Payment Status:</strong> ${order.paymentStatus}</p>
        <p><strong>Razorpay Ref:</strong> ${order.paymentReference || "Not available"}</p>
        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
        <ul>
          ${order.items.map((item) => `<li>${item.itemName} - ${item.quantity} x ${TrendCartAPI.formatCurrency(item.unitPrice)}</li>`).join("")}
        </ul>
      </div>
    `).join("");
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    box.innerHTML = `<div class="card">${error.message}</div>`;
  }
}

loadOrders();
</script>
</body>
</html>

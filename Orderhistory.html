<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f5f7fb;
  color: #162033;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px 50px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.topbar a {
  text-decoration: none;
  background: #1758d7;
  color: white;
  padding: 12px 16px;
  border-radius: 999px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 18px;
}

.card {
  background: white;
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 16px 34px rgba(12, 31, 64, 0.08);
}

ul {
  padding-left: 18px;
}

.meta {
  color: #50627d;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Order History</h1>
      <p>Products and food orders saved from checkout</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <a href="Profile.html">Profile</a>
    </div>
  </div>
  <div class="grid" id="orders"></div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadOrders() {
  const box = document.getElementById("orders");
  try {
    const orders = await TrendCartAPI.getOrderHistory();
    if (!orders.length) {
      box.innerHTML = `<div class="card">No orders found yet.</div>`;
      return;
    }

    box.innerHTML = orders.map((order) => `
      <div class="card">
        <h3>Order #${order.id}</h3>
        <p class="meta">${order.orderType.toUpperCase()} • ${order.paymentStatus}</p>
        <p><strong>Total:</strong> ${TrendCartAPI.formatCurrency(order.totalAmount)}</p>
        <p><strong>Payment:</strong> ${order.paymentMethod}</p>
        <p><strong>UPI Ref:</strong> ${order.paymentReference || "Not entered"}</p>
        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
        <ul>
          ${order.items.map((item) => `<li>${item.itemName} - ${item.quantity} x ${TrendCartAPI.formatCurrency(item.unitPrice)}</li>`).join("")}
        </ul>
      </div>
    `).join("");
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    box.innerHTML = `<div class="card">${error.message}</div>`;
  }
}

loadOrders();
</script>
</body>
</html>

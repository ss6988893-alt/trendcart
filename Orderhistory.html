<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --line: rgba(154, 210, 255, 0.12);
  --text: #eef5ff;
  --muted: #95a8c7;
  --accent: #89f8d6;
  --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(109, 184, 255, 0.16), transparent 22%),
    radial-gradient(circle at 82% 18%, rgba(137, 248, 214, 0.12), transparent 18%),
    linear-gradient(180deg, #040814, #081020 44%, #050816);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 90%);
}
.page {
  position: relative;
  max-width: 1140px;
  margin: 0 auto;
  padding: 24px 20px 42px;
}
.topbar,
.card {
  border: 1px solid var(--line);
  box-shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(6, 12, 26, 0.74);
  backdrop-filter: blur(16px);
}
.topbar a {
  text-decoration: none;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 999px;
  font-weight: 800;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 18px;
}
.card {
  border-radius: 24px;
  padding: 20px;
  background: rgba(10, 18, 36, 0.84);
}
.card h3 {
  margin-top: 0;
  font-family: "Syne", sans-serif;
}
ul {
  padding-left: 18px;
  color: var(--muted);
}
.meta {
  color: var(--muted);
  font-size: 14px;
}
.card p {
  color: var(--muted);
}
.card strong {
  color: var(--text);
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <h1>Order History</h1>
      <p>Products and food orders saved from checkout</p>
    </div>
    <div>
      <a href="index.html">Home</a>
      <a href="Profile.html">Profile</a>
    </div>
  </div>
  <div class="grid" id="orders"></div>
</div>

<script src="Assests/api.js"></script>
<script>
async function loadOrders() {
  const box = document.getElementById("orders");
  try {
    const orders = await TrendCartAPI.getOrderHistory();
    if (!orders.length) {
      box.innerHTML = `<div class="card">No orders found yet.</div>`;
      return;
    }

    box.innerHTML = orders.map((order) => `
      <div class="card">
        <h3>Order #${order.id}</h3>
        <p class="meta">${order.orderType.toUpperCase()} • ${order.paymentStatus}</p>
        <p><strong>Total:</strong> ${TrendCartAPI.formatCurrency(order.totalAmount)}</p>
        <p><strong>Payment:</strong> ${order.paymentMethod}</p>
        <p><strong>UPI Ref:</strong> ${order.paymentReference || "Not entered"}</p>
        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
        <ul>
          ${order.items.map((item) => `<li>${item.itemName} - ${item.quantity} x ${TrendCartAPI.formatCurrency(item.unitPrice)}</li>`).join("")}
        </ul>
      </div>
    `).join("");
  } catch (error) {
    if (error.message.includes("login")) {
      window.location.href = "Login.html";
      return;
    }
    box.innerHTML = `<div class="card">${error.message}</div>`;
  }
}

loadOrders();
</script>
</body>
</html>
